<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #eee; height: 100vh; display: flex; justify-content: center; align-items: center; }
    .chat-container { width: 400px; max-width: 90vw; height: 600px; background: #16213e; border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
    .chat-header { padding: 16px 20px; background: #0f3460; text-align: center; font-weight: 600; font-size: 18px; }
    .messages { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 8px; }
    .messages::-webkit-scrollbar { width: 6px; }
    .messages::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 3px; }
    .message { padding: 8px 14px; border-radius: 18px; max-width: 80%; word-break: break-word; line-height: 1.4; }
    .message.self { background: #0f3460; align-self: flex-end; border-bottom-right-radius: 4px; }
    .message.other { background: #1a1a40; align-self: flex-start; border-bottom-left-radius: 4px; }
    .message.system { background: transparent; align-self: center; font-size: 12px; color: #888; }
    .input-area { display: flex; padding: 12px 16px; gap: 8px; border-top: 1px solid #0f3460; }
    .input-area input { flex: 1; padding: 10px 16px; border: none; border-radius: 24px; background: #1a1a40; color: #eee; font-size: 14px; outline: none; }
    .input-area input::placeholder { color: #666; }
    .input-area button { padding: 10px 20px; border: none; border-radius: 24px; background: #e94560; color: #fff; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    .input-area button:hover { background: #d63851; }
    .status { text-align: center; padding: 8px; font-size: 12px; color: #888; }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">💬 Chat Room</div>
    <div class="messages" id="messages"></div>
    <div class="status" id="status">Connecting...</div>
    <div class="input-area">
      <input type="text" id="input" placeholder="Type a message..." disabled />
      <button id="sendBtn" disabled>Send</button>
    </div>
  </div>

  <script>
    const wsUrl = window.location.origin.replace(/^http/, 'ws') + '?room=global';
    const ws = new WebSocket(wsUrl);
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');
    const statusEl = document.getElementById('status');

    ws.onopen = () => {
      statusEl.textContent = 'Connected';
      inputEl.disabled = false;
      sendBtn.disabled = false;
      inputEl.focus();
    };

    ws.onclose = () => {
      statusEl.textContent = 'Disconnected. Reconnecting...';
      inputEl.disabled = true;
      sendBtn.disabled = true;
      setTimeout(() => location.reload(), 3000);
    };

    ws.onerror = () => {
      statusEl.textContent = 'Connection error';
    };

    ws.onmessage = (event) => {
      const msg = document.createElement('div');
      msg.className = 'message other';
      msg.textContent = event.data;
      messagesEl.appendChild(msg);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    };

    function sendMsg() {
      const text = inputEl.value.trim();
      if (!text) return;

      // Show own message
      const msg = document.createElement('div');
      msg.className = 'message self';
      msg.textContent = text;
      messagesEl.appendChild(msg);
      messagesEl.scrollTop = messagesEl.scrollHeight;

      ws.send(text);
      inputEl.value = '';
    }

    sendBtn.addEventListener('click', sendMsg);
    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendMsg();
    });
  </script>
</body>
</html>
